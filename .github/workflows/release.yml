name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained, win-x64)
        run: dotnet publish ColumnFinder.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Zip
        run: Compress-Archive -Path publish\* -DestinationPath ColumnFinder-${{ github.ref_name }}-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ColumnFinder-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
